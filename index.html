<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .date-navigation {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-button {
            background: #333;
            border: 1px solid #555;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: #444;
        }

        .current-date {
            font-size: 24px;
            font-weight: bold;
            min-width: 250px;
            text-align: center;
        }

        .calendar-icon {
            font-size: 24px;
            margin-right: 10px;
            background: #333;
            border: 1px solid #555;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-icon:hover {
            background: #444;
        }

        .today-button, .add-card-btn, .pdf-button {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .today-button:hover, .add-card-btn:hover, .pdf-button:hover {
            background: #444;
        }

        .pdf-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .cards-container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
        }

        .card-title {
            background: transparent;
            color: white;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .card-title:focus {
            outline: none;
            border-color: #555;
        }

        .remove-card {
            background: #222;
            border: 1px solid #444;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        .remove-card:hover {
            background: #333;
        }

        .tasks-list {
            margin-top: 15px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .task-checkbox {
            margin-top: 2px;
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            background: transparent;
            color: white;
            border: 1px solid #333;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
            min-width: 0;
            word-break: break-word;
        }

        .task-text:focus {
            outline: none;
            border-color: #555;
        }

        .remove-task {
            background: #222;
            border: 1px solid #444;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
        }

        .remove-task:hover {
            background: #333;
        }

        .add-task-btn {
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }

        .add-task-btn:hover {
            background: #333;
            color: white;
        }

        .no-cards {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 16px;
            grid-column: 1 / -1;
        }

        /* Hide the default date picker, we'll trigger it programmatically */
        .hidden-date-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="date-navigation">
                <button class="calendar-icon" id="calendarPicker">📅</button>
                <input type="date" id="datePicker" class="hidden-date-input">
                <button class="nav-button" id="prevDay">←</button>
                <div class="current-date" id="currentDate"></div>
                <button class="nav-button" id="nextDay">→</button>
                <button class="today-button" id="todayBtn">Today</button>
            </div>
            <div class="pdf-buttons">
                <button class="pdf-button" id="dailyPdf">Daily PDF</button>
                <button class="pdf-button" id="monthlyPdf">Monthly PDF</button>
            </div>
        </div>

        <button class="add-card-btn" id="addCardBtn">+ Add Card</button>
        
        <div class="cards-container" id="cardsContainer"></div>
    </div>

    <script>
        // Initialize jsPDF
        const { jsPDF } = window.jspdf;

        // State management
        let currentDate = new Date();
        let cardsData = {};

        // Load data from localStorage
        function loadData() {
            const savedDate = localStorage.getItem('lastViewedDate');
            const savedData = localStorage.getItem('cardsData');
            
            if (savedDate) {
                currentDate = new Date(savedDate);
            }
            
            if (savedData) {
                cardsData = JSON.parse(savedData);
            }
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('lastViewedDate', currentDate.toISOString());
            localStorage.setItem('cardsData', JSON.stringify(cardsData));
        }

        // Format date for display
        function formatDate(date) {
            return date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Format date for key
        function getDateKey(date) {
            return date.toISOString().split('T')[0];
        }

        // Format date for input field (YYYY-MM-DD)
        function formatDateForInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Update UI with current date
        function updateDateDisplay() {
            document.getElementById('currentDate').textContent = formatDate(currentDate);
            // Update the date picker value
            document.getElementById('datePicker').value = formatDateForInput(currentDate);
        }

        // Render all cards for current date
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const dateKey = getDateKey(currentDate);
            const cards = cardsData[dateKey] || [];
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="no-cards">No cards for this day. Click "Add Card" to create one.</div>';
                return;
            }
            
            container.innerHTML = '';
            
            cards.forEach((card, cardIndex) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.innerHTML = `
                    <div class="card-header">
                        <input type="text" class="card-title" value="${card.title}" placeholder="Card Title">
                        <button class="remove-card">×</button>
                    </div>
                    <div class="tasks-list">
                        ${card.tasks.map((task, taskIndex) => `
                            <div class="task-item">
                                <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                                <input type="text" class="task-text" value="${task.text}" placeholder="Task description">
                                <button class="remove-task">×</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="add-task-btn">+ Add Task</button>
                `;
                
                // Card title editing
                const titleInput = cardElement.querySelector('.card-title');
                titleInput.addEventListener('input', (e) => {
                    updateCard(cardIndex, { title: e.target.value });
                });
                
                // Remove card
                cardElement.querySelector('.remove-card').addEventListener('click', () => {
                    removeCard(cardIndex);
                });
                
                // Task checkboxes
                cardElement.querySelectorAll('.task-checkbox').forEach((checkbox, taskIndex) => {
                    checkbox.addEventListener('change', () => {
                        updateTask(cardIndex, taskIndex, { completed: checkbox.checked });
                    });
                });
                
                // Task text editing
                cardElement.querySelectorAll('.task-text').forEach((input, taskIndex) => {
                    input.addEventListener('input', (e) => {
                        updateTask(cardIndex, taskIndex, { text: e.target.value });
                    });
                });
                
                // Remove task buttons
                cardElement.querySelectorAll('.remove-task').forEach((button, taskIndex) => {
                    button.addEventListener('click', () => {
                        removeTask(cardIndex, taskIndex);
                    });
                });
                
                // Add task button
                cardElement.querySelector('.add-task-btn').addEventListener('click', () => {
                    addTask(cardIndex);
                });
                
                container.appendChild(cardElement);
            });
        }

        // Add a new card
        function addCard() {
            const dateKey = getDateKey(currentDate);
            if (!cardsData[dateKey]) {
                cardsData[dateKey] = [];
            }
            
            cardsData[dateKey].push({
                title: 'New Card',
                tasks: []
            });
            
            saveData();
            renderCards();
        }

        // Update card
        function updateCard(cardIndex, updates) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex] = { ...cardsData[dateKey][cardIndex], ...updates };
            saveData();
        }

        // Add a new task to a card
        function addTask(cardIndex) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex].tasks.push({
                text: '',
                completed: false
            });
            
            saveData();
            renderCards();
        }

        // Update task
        function updateTask(cardIndex, taskIndex, updates) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex].tasks[taskIndex] = {
                ...cardsData[dateKey][cardIndex].tasks[taskIndex],
                ...updates
            };
            saveData();
        }

        // Remove task
        function removeTask(cardIndex, taskIndex) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex].tasks.splice(taskIndex, 1);
            saveData();
            renderCards();
        }

        // Remove card
        function removeCard(cardIndex) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey].splice(cardIndex, 1);
            
            // Remove date entry if no cards left
            if (cardsData[dateKey].length === 0) {
                delete cardsData[dateKey];
            }
            
            saveData();
            renderCards();
        }

        // Navigate to a specific date
        function navigateToDate(date) {
            currentDate = new Date(date);
            updateDateDisplay();
            renderCards();
            saveData();
        }

        // Generate daily PDF
        async function generateDailyPDF() {
            const dateKey = getDateKey(currentDate);
            const cards = cardsData[dateKey] || [];
            
            if (cards.length === 0) {
                alert('No tasks for this day');
                return;
            }
            
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });
            
            // Set minimal margins
            const margin = 10;
            let yPos = margin;
            
            // Date header
            pdf.setFontSize(16);
            pdf.text(formatDate(currentDate), margin, yPos);
            yPos += 10;
            
            pdf.setFontSize(11);
            
            // Add cards and tasks
            cards.forEach((card, cardIndex) => {
                if (yPos > 270) {
                    pdf.addPage();
                    yPos = margin;
                }
                
                // Card title
                pdf.setFont('helvetica', 'bold');
                pdf.text(`${cardIndex + 1}. ${card.title}`, margin, yPos);
                yPos += 7;
                
                // Tasks
                pdf.setFont('helvetica', 'normal');
                card.tasks.forEach((task, taskIndex) => {
                    if (yPos > 270) {
                        pdf.addPage();
                        yPos = margin;
                    }
                    
                    const checkbox = task.completed ? '✓' : '□';
                    const taskText = `${checkbox} ${task.text}`;
                    pdf.text(`  ${taskIndex + 1}. ${taskText}`, margin, yPos);
                    yPos += 6;
                });
                
                yPos += 4; // Space between cards
            });
            
            pdf.save(`tasks_${dateKey}.pdf`);
        }

        // Generate monthly PDF
        async function generateMonthlyPDF() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Get all dates in the month
            const startDate = new Date(year, month, 1);
            const endDate = new Date(year, month + 1, 0);
            
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });
            
            const margin = 10;
            let yPos = margin;
            
            // Month header
            pdf.setFontSize(16);
            const monthName = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            pdf.text(`Tasks for ${monthName}`, margin, yPos);
            yPos += 10;
            
            pdf.setFontSize(11);
            
            // Iterate through all days in month
            for (let date = new Date(startDate); date <= endDate; date.setDate(date.getDate() + 1)) {
                const dateKey = date.toISOString().split('T')[0];
                const cards = cardsData[dateKey] || [];
                
                if (cards.length > 0) {
                    if (yPos > 270) {
                        pdf.addPage();
                        yPos = margin;
                    }
                    
                    // Date header
                    pdf.setFont('helvetica', 'bold');
                    pdf.text(date.toLocaleDateString('en-US', { 
                        weekday: 'short', 
                        month: 'short', 
                        day: 'numeric' 
                    }), margin, yPos);
                    yPos += 6;
                    
                    // Cards and tasks
                    pdf.setFont('helvetica', 'normal');
                    cards.forEach((card, cardIndex) => {
                        if (yPos > 270) {
                            pdf.addPage();
                            yPos = margin;
                        }
                        
                        // Card title
                        pdf.text(`  ${cardIndex + 1}. ${card.title}`, margin, yPos);
                        yPos += 5;
                        
                        // Tasks
                        card.tasks.forEach((task, taskIndex) => {
                            if (yPos > 270) {
                                pdf.addPage();
                                yPos = margin;
                            }
                            
                            const checkbox = task.completed ? '✓' : '□';
                            const taskText = `${checkbox} ${task.text}`;
                            pdf.text(`    ${taskIndex + 1}. ${taskText}`, margin, yPos);
                            yPos += 5;
                        });
                        
                        yPos += 3; // Space between cards
                    });
                    
                    yPos += 5; // Space between days
                }
            }
            
            pdf.save(`tasks_${year}_${month + 1}.pdf`);
        }

        // Initialize
        function init() {
            loadData();
            updateDateDisplay();
            renderCards();
            
            // Event listeners for navigation
            document.getElementById('prevDay').addEventListener('click', () => {
                currentDate.setDate(currentDate.getDate() - 1);
                updateDateDisplay();
                renderCards();
                saveData();
            });
            
            document.getElementById('nextDay').addEventListener('click', () => {
                currentDate.setDate(currentDate.getDate() + 1);
                updateDateDisplay();
                renderCards();
                saveData();
            });
            
            document.getElementById('todayBtn').addEventListener('click', () => {
                currentDate = new Date();
                updateDateDisplay();
                renderCards();
                saveData();
            });
            
            // Calendar icon date picker
            document.getElementById('calendarPicker').addEventListener('click', () => {
                // Trigger the hidden date input
                const datePicker = document.getElementById('datePicker');
                datePicker.showPicker(); // Modern browsers support this
                datePicker.focus();
            });
            
            // Date picker change event
            document.getElementById('datePicker').addEventListener('change', (e) => {
                if (e.target.value) {
                    navigateToDate(e.target.value);
                }
            });
            
            // Add card button
            document.getElementById('addCardBtn').addEventListener('click', addCard);
            
            // PDF buttons
            document.getElementById('dailyPdf').addEventListener('click', generateDailyPDF);
            document.getElementById('monthlyPdf').addEventListener('click', generateMonthlyPDF);
        }

        // Start the application
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
