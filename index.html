<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .date-navigation {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-button {
            background: #333;
            border: 1px solid #555;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: #444;
        }

        .current-date {
            font-size: 24px;
            font-weight: bold;
            min-width: 250px;
            text-align: center;
        }

        .calendar-icon {
            font-size: 24px;
            margin-right: 10px;
            background: #333;
            border: 1px solid #555;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-icon:hover {
            background: #444;
        }

        .today-button, .add-card-btn, .pdf-button {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .today-button:hover, .add-card-btn:hover, .pdf-button:hover {
            background: #444;
        }

        .pdf-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .cards-container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
        }

        .card-title {
            background: transparent;
            color: white;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .card-title:focus {
            outline: none;
            border-color: #555;
        }

        .remove-card {
            background: #222;
            border: 1px solid #444;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        .remove-card:hover {
            background: #333;
        }

        .tasks-list {
            margin-top: 15px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .task-checkbox {
            margin-top: 2px;
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            background: transparent;
            color: white;
            border: 1px solid #333;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
            min-width: 0;
            word-break: break-word;
        }

        .task-text:focus {
            outline: none;
            border-color: #555;
        }

        .remove-task {
            background: #222;
            border: 1px solid #444;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
        }

        .remove-task:hover {
            background: #333;
        }

        .add-task-btn {
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }

        .add-task-btn:hover {
            background: #333;
            color: white;
        }

        .no-cards {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .hidden-date-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="date-navigation">
                <button class="calendar-icon" id="calendarPicker">📅</button>
                <input type="date" id="datePicker" class="hidden-date-input">
                <button class="nav-button" id="prevDay">←</button>
                <div class="current-date" id="currentDate"></div>
                <button class="nav-button" id="nextDay">→</button>
                <button class="today-button" id="todayBtn">Today</button>
            </div>
            <div class="pdf-buttons">
                <button class="pdf-button" id="dailyPdf">Daily PDF</button>
                <button class="pdf-button" id="monthlyPdf">Monthly PDF</button>
            </div>
        </div>

        <button class="add-card-btn" id="addCardBtn">+ Add Card</button>
        
        <div class="cards-container" id="cardsContainer"></div>
    </div>

    <script>
        // Initialize jsPDF
        const { jsPDF } = window.jspdf;

        // State management
        let currentDate = new Date();
        let cardsData = {};

        // Load data from localStorage
        function loadData() {
            const savedDate = localStorage.getItem('lastViewedDate');
            const savedData = localStorage.getItem('cardsData');
            
            if (savedDate) {
                currentDate = new Date(savedDate);
            }
            
            if (savedData) {
                cardsData = JSON.parse(savedData);
            }
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('lastViewedDate', currentDate.toISOString());
            localStorage.setItem('cardsData', JSON.stringify(cardsData));
        }

        // Format date for display
        function formatDate(date) {
            return date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Format date for key
        function getDateKey(date) {
            return date.toISOString().split('T')[0];
        }

        // Format date for input field (YYYY-MM-DD)
        function formatDateForInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Update UI with current date
        function updateDateDisplay() {
            document.getElementById('currentDate').textContent = formatDate(currentDate);
            document.getElementById('datePicker').value = formatDateForInput(currentDate);
        }

        // Render all cards for current date
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const dateKey = getDateKey(currentDate);
            const cards = cardsData[dateKey] || [];
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="no-cards">No cards for this day. Click "Add Card" to create one.</div>';
                return;
            }
            
            container.innerHTML = '';
            
            cards.forEach((card, cardIndex) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.innerHTML = `
                    <div class="card-header">
                        <input type="text" class="card-title" value="${card.title}" placeholder="Card Title">
                        <button class="remove-card">×</button>
                    </div>
                    <div class="tasks-list">
                        ${card.tasks.map((task, taskIndex) => `
                            <div class="task-item">
                                <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                                <input type="text" class="task-text" value="${task.text}" placeholder="Task description">
                                <button class="remove-task">×</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="add-task-btn">+ Add Task</button>
                `;
                
                const titleInput = cardElement.querySelector('.card-title');
                titleInput.addEventListener('input', (e) => {
                    updateCard(cardIndex, { title: e.target.value });
                });
                
                cardElement.querySelector('.remove-card').addEventListener('click', () => {
                    removeCard(cardIndex);
                });
                
                cardElement.querySelectorAll('.task-checkbox').forEach((checkbox, taskIndex) => {
                    checkbox.addEventListener('change', () => {
                        updateTask(cardIndex, taskIndex, { completed: checkbox.checked });
                    });
                });
                
                cardElement.querySelectorAll('.task-text').forEach((input, taskIndex) => {
                    input.addEventListener('input', (e) => {
                        updateTask(cardIndex, taskIndex, { text: e.target.value });
                    });
                });
                
                cardElement.querySelectorAll('.remove-task').forEach((button, taskIndex) => {
                    button.addEventListener('click', () => {
                        removeTask(cardIndex, taskIndex);
                    });
                });
                
                cardElement.querySelector('.add-task-btn').addEventListener('click', () => {
                    addTask(cardIndex);
                });
                
                container.appendChild(cardElement);
            });
        }

        // Add a new card
        function addCard() {
            const dateKey = getDateKey(currentDate);
            if (!cardsData[dateKey]) {
                cardsData[dateKey] = [];
            }
            
            cardsData[dateKey].push({
                title: 'New Card',
                tasks: []
            });
            
            saveData();
            renderCards();
        }

        // Update card
        function updateCard(cardIndex, updates) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex] = { ...cardsData[dateKey][cardIndex], ...updates };
            saveData();
        }

        // Add a new task to a card
        function addTask(cardIndex) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex].tasks.push({
                text: '',
                completed: false
            });
            
            saveData();
            renderCards();
        }

        // Update task
        function updateTask(cardIndex, taskIndex, updates) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex].tasks[taskIndex] = {
                ...cardsData[dateKey][cardIndex].tasks[taskIndex],
                ...updates
            };
            saveData();
        }

        // Remove task
        function removeTask(cardIndex, taskIndex) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey][cardIndex].tasks.splice(taskIndex, 1);
            saveData();
            renderCards();
        }

        // Remove card
        function removeCard(cardIndex) {
            const dateKey = getDateKey(currentDate);
            cardsData[dateKey].splice(cardIndex, 1);
            
            if (cardsData[dateKey].length === 0) {
                delete cardsData[dateKey];
            }
            
            saveData();
            renderCards();
        }

        // Navigate to a specific date
        function navigateToDate(date) {
            currentDate = new Date(date);
            updateDateDisplay();
            renderCards();
            saveData();
        }

        // Generate daily PDF
        async function generateDailyPDF() {
            const dateKey = getDateKey(currentDate);
            const cards = cardsData[dateKey] || [];
            
            if (cards.length === 0) {
                alert('No tasks for this day');
                return;
            }
            
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });
            
            // Set minimal margins
            const margin = 10;
            let yPos = margin;
            
            // Date header
            pdf.setFontSize(16);
            pdf.text(`Tasks for ${formatDate(currentDate)}`, margin, yPos);
            yPos += 12;
            
            pdf.setFontSize(11);
            
            // Add cards and tasks in table format
            cards.forEach((card, cardIndex) => {
                if (yPos > 270) {
                    pdf.addPage();
                    yPos = margin;
                }
                
                // Card title
                pdf.setFont('helvetica', 'bold');
                pdf.text(`Card: ${card.title}`, margin, yPos);
                yPos += 8;
                
                // Table header
                pdf.setFont('helvetica', 'bold');
                pdf.text('Status', margin, yPos);
                pdf.text('Task Description', margin + 25, yPos);
                yPos += 6;
                
                // Horizontal line
                pdf.line(margin, yPos, 200, yPos);
                yPos += 8;
                
                // Tasks in table format
                pdf.setFont('helvetica', 'normal');
                card.tasks.forEach((task, taskIndex) => {
                    if (yPos > 270) {
                        pdf.addPage();
                        yPos = margin;
                        // Re-add table header on new page
                        pdf.setFont('helvetica', 'bold');
                        pdf.text('Status', margin, yPos);
                        pdf.text('Task Description', margin + 25, yPos);
                        yPos += 6;
                        pdf.line(margin, yPos, 200, yPos);
                        yPos += 8;
                        pdf.setFont('helvetica', 'normal');
                    }
                    
                    const status = task.completed ? 'Done' : 'Undone';
                    const taskNumber = `${cardIndex + 1}.${taskIndex + 1}`;
                    
                    // Status column
                    pdf.text(status, margin, yPos);
                    // Task description column
                    pdf.text(`${taskNumber}. ${task.text}`, margin + 25, yPos);
                    
                    yPos += 7;
                });
                
                yPos += 10; // Space between cards
            });
            
            pdf.save(`tasks_${dateKey}.pdf`);
        }

        // Generate monthly PDF
        async function generateMonthlyPDF() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Get all dates in the month
            const startDate = new Date(year, month, 1);
            const endDate = new Date(year, month + 1, 0);
            
            // Collect all tasks for the month
            let monthTasks = [];
            for (let date = new Date(startDate); date <= endDate; date.setDate(date.getDate() + 1)) {
                const dateKey = date.toISOString().split('T')[0];
                const cards = cardsData[dateKey] || [];
                
                if (cards.length > 0) {
                    const formattedDate = date.toLocaleDateString('en-US', { 
                        weekday: 'short', 
                        month: 'short', 
                        day: 'numeric' 
                    });
                    
                    cards.forEach((card, cardIndex) => {
                        card.tasks.forEach((task, taskIndex) => {
                            monthTasks.push({
                                date: formattedDate,
                                dateObj: new Date(date),
                                cardTitle: card.title,
                                taskText: task.text,
                                completed: task.completed,
                                cardIndex: cardIndex,
                                taskIndex: taskIndex
                            });
                        });
                    });
                }
            }
            
            if (monthTasks.length === 0) {
                alert('No tasks for this month');
                return;
            }
            
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });
            
            const margin = 10;
            let yPos = margin;
            
            // Month header
            pdf.setFontSize(16);
            const monthName = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            pdf.text(`Monthly Tasks - ${monthName}`, margin, yPos);
            yPos += 12;
            
            // Table header
            pdf.setFontSize(11);
            pdf.setFont('helvetica', 'bold');
            pdf.text('Date', margin, yPos);
            pdf.text('Card', margin + 30, yPos);
            pdf.text('Status', margin + 80, yPos);
            pdf.text('Task Description', margin + 110, yPos);
            yPos += 6;
            
            // Horizontal line
            pdf.line(margin, yPos, 280, yPos);
            yPos += 8;
            
            // Sort tasks by date
            monthTasks.sort((a, b) => a.dateObj - b.dateObj);
            
            // Tasks in table format
            pdf.setFont('helvetica', 'normal');
            monthTasks.forEach((task, index) => {
                if (yPos > 190) {
                    pdf.addPage();
                    yPos = margin;
                    // Re-add table header on new page
                    pdf.setFont('helvetica', 'bold');
                    pdf.text('Date', margin, yPos);
                    pdf.text('Card', margin + 30, yPos);
                    pdf.text('Status', margin + 80, yPos);
                    pdf.text('Task Description', margin + 110, yPos);
                    yPos += 6;
                    pdf.line(margin, yPos, 280, yPos);
                    yPos += 8;
                    pdf.setFont('helvetica', 'normal');
                }
                
                const status = task.completed ? 'Done' : 'Undone';
                const taskNumber = `${task.cardIndex + 1}.${task.taskIndex + 1}`;
                
                // Date column
                pdf.text(task.date, margin, yPos);
                // Card column
                pdf.text(task.cardTitle, margin + 30, yPos);
                // Status column
                pdf.text(status, margin + 80, yPos);
                // Task description column
                pdf.text(`${taskNumber}. ${task.taskText}`, margin + 110, yPos);
                
                yPos += 7;
            });
            
            pdf.save(`tasks_monthly_${year}_${month + 1}.pdf`);
        }

        // Initialize
        function init() {
            loadData();
            updateDateDisplay();
            renderCards();
            
            // Event listeners
            document.getElementById('prevDay').addEventListener('click', () => {
                currentDate.setDate(currentDate.getDate() - 1);
                updateDateDisplay();
                renderCards();
                saveData();
            });
            
            document.getElementById('nextDay').addEventListener('click', () => {
                currentDate.setDate(currentDate.getDate() + 1);
                updateDateDisplay();
                renderCards();
                saveData();
            });
            
            document.getElementById('todayBtn').addEventListener('click', () => {
                currentDate = new Date();
                updateDateDisplay();
                renderCards();
                saveData();
            });
            
            document.getElementById('calendarPicker').addEventListener('click', () => {
                const datePicker = document.getElementById('datePicker');
                datePicker.showPicker();
                datePicker.focus();
            });
            
            document.getElementById('datePicker').addEventListener('change', (e) => {
                if (e.target.value) {
                    navigateToDate(e.target.value);
                }
            });
            
            document.getElementById('addCardBtn').addEventListener('click', addCard);
            document.getElementById('dailyPdf').addEventListener('click', generateDailyPDF);
            document.getElementById('monthlyPdf').addEventListener('click', generateMonthlyPDF);
        }

        // Start the application
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
