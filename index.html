<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #111116;
            --surface2: #18181e;
            --border: #25252e;
            --border-hover: #3a3a48;
            --text: #e8e8ed;
            --text-dim: #6e6e7a;
            --text-muted: #44444f;
            --accent: #c9a0ff;
            --accent-dim: #7b5ea7;
            --accent-glow: rgba(201, 160, 255, 0.08);
            --done: #5ae4a7;
            --done-dim: #2a7a52;
            --danger: #ff6b7a;
            --radius: 10px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Ambient background ── */
        body::before {
            content: '';
            position: fixed;
            top: -40%; left: -20%;
            width: 80%; height: 80%;
            background: radial-gradient(ellipse, rgba(201,160,255,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%; right: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(90,228,167,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login Screen ── */
        .login-screen {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            background: var(--bg);
            animation: fadeIn 0.4s ease;
        }
        .login-screen.hidden { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 380px;
            max-width: 90vw;
            animation: slideUp 0.5s ease 0.1s both;
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(201,160,255,0.15), transparent 50%, rgba(90,228,167,0.1));
            z-index: -1;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            padding: 1px;
        }

        .login-brand {
            font-family: 'Instrument Serif', serif;
            font-size: 36px;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .login-brand span { color: var(--accent); font-style: italic; }
        .login-subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 36px;
            letter-spacing: 0.3px;
        }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-input::placeholder { color: var(--text-muted); }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-dim), #9b6dd7);
            border: none;
            color: #fff;
            padding: 13px;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(201,160,255,0.2);
        }
        .login-btn:active { transform: translateY(0); }

        .login-error {
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
        }
        .login-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .login-toggle a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .login-toggle a:hover { text-decoration: underline; }

        /* ── App Layout ── */
        .app { display: none; position: relative; z-index: 1; }
        .app.active { display: block; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* ── Top Bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .brand {
            font-family: 'Instrument Serif', serif;
            font-size: 26px;
            letter-spacing: -0.3px;
            user-select: none;
        }
        .brand span { color: var(--accent); font-style: italic; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            color: var(--text-dim);
            display: flex; align-items: center; gap: 6px;
        }
        .user-badge .dot {
            width: 6px; height: 6px;
            background: var(--done);
            border-radius: 50%;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── Date Navigation ── */
        .date-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .date-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .nav-btn:hover { background: var(--surface2); border-color: var(--border-hover); }

        .current-date {
            font-family: 'Instrument Serif', serif;
            font-size: 22px;
            min-width: 200px;
            text-align: center;
            letter-spacing: -0.3px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .action-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hover); }
        .action-btn.primary {
            background: var(--accent-glow);
            border-color: var(--accent-dim);
            color: var(--accent);
        }
        .action-btn.primary:hover {
            background: rgba(201,160,255,0.14);
        }

        .hidden-date-input { position: absolute; opacity: 0; pointer-events: none; }

        /* ── Cards Grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        @media (max-width: 700px) {
            .cards-grid { grid-template-columns: 1fr; }
            .current-date { min-width: auto; font-size: 18px; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
            animation: slideUp 0.3s ease both;
        }
        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 8px;
        }
        .card-title-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            flex: 1;
            padding: 4px 0;
            outline: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .card-title-input:focus { border-bottom-color: var(--accent-dim); }
        .card-title-input::placeholder { color: var(--text-muted); }

        .card-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 28px; height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--surface2); color: var(--text-dim); }
        .icon-btn.danger:hover { color: var(--danger); }

        /* ── Tasks ── */
        .tasks-list { display: flex; flex-direction: column; gap: 6px; }

        .task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .task-row:hover { background: rgba(255,255,255,0.02); }

        .custom-check {
            position: relative;
            width: 18px; height: 18px;
            flex-shrink: 0;
        }
        .custom-check input {
            position: absolute;
            opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
            z-index: 1;
        }
        .custom-check .check-visual {
            width: 18px; height: 18px;
            border: 1.5px solid var(--border-hover);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-size: 11px;
            color: transparent;
        }
        .custom-check input:checked + .check-visual {
            background: var(--done-dim);
            border-color: var(--done);
            color: #fff;
        }

        .task-text-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            flex: 1;
            padding: 2px 0;
            outline: none;
            transition: color 0.2s;
        }
        .task-text-input::placeholder { color: var(--text-muted); }
        .task-row.completed .task-text-input {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .add-task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            margin-top: 4px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            transition: all 0.15s;
        }
        .add-task-row:hover { background: rgba(255,255,255,0.02); color: var(--text-dim); }
        .add-task-row .plus {
            width: 18px; height: 18px;
            border: 1.5px dashed var(--border-hover);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* ── Empty State ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        .empty-state p { font-size: 14px; line-height: 1.6; }

        /* ── Loading overlay ── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
            transition: opacity 0.3s;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Status Toast ── */
        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 18px;
            font-size: 13px;
            color: var(--text-dim);
            z-index: 300;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<!-- ── Login Screen ── -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="login-brand">Task<span>flow</span></div>
        <p class="login-subtitle">Your tasks, everywhere.</p>

        <div id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-input" type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button class="login-btn" id="loginBtn">Sign In</button>
            <p class="login-error" id="loginError"></p>
            <p class="login-toggle">No account? <a id="showRegister">Create one</a></p>
        </div>

        <div id="registerForm" style="display:none">
            <div class="form-group">
                <label class="form-label">Choose a Username</label>
                <input class="form-input" type="text" id="regUser" placeholder="Pick a username" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Set Password</label>
                <input class="form-input" type="password" id="regPass" placeholder="Create a password" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input class="form-input" type="password" id="regPass2" placeholder="Confirm password" autocomplete="new-password">
            </div>
            <button class="login-btn" id="registerBtn">Create Account</button>
            <p class="login-error" id="regError"></p>
            <p class="login-toggle">Have an account? <a id="showLogin">Sign in</a></p>
        </div>
    </div>
</div>

<!-- ── Main App ── -->
<div class="app" id="app">
    <div class="container">
        <div class="topbar">
            <div class="brand">Task<span>flow</span></div>
            <div class="user-info">
                <div class="user-badge"><span class="dot"></span> <span id="displayUser"></span></div>
                <button class="logout-btn" id="logoutBtn">Sign out</button>
            </div>
        </div>

        <div class="date-nav">
            <div class="date-controls">
                <button class="nav-btn" id="calendarPicker" title="Pick date">&#128197;</button>
                <input type="date" id="datePicker" class="hidden-date-input">
                <button class="nav-btn" id="prevDay">&#8592;</button>
                <div class="current-date" id="currentDate"></div>
                <button class="nav-btn" id="nextDay">&#8594;</button>
                <button class="action-btn" id="todayBtn">Today</button>
            </div>
            <div class="action-btns">
                <button class="action-btn primary" id="addCardBtn">+ Card</button>
            </div>
        </div>

        <div class="cards-grid" id="cardsContainer"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// Persistent Storage Adapter
// ═══════════════════════════════════════════
const Storage = {
    async get(key) {
        try {
            const r = await window.storage.get(key);
            return r ? JSON.parse(r.value) : null;
        } catch { return null; }
    },
    async set(key, value) {
        try {
            await window.storage.set(key, JSON.stringify(value));
            return true;
        } catch { return false; }
    },
    async delete(key) {
        try {
            await window.storage.delete(key);
            return true;
        } catch { return false; }
    },
    async list(prefix) {
        try {
            const r = await window.storage.list(prefix);
            return r ? r.keys : [];
        } catch { return []; }
    }
};

// ═══════════════════════════════════════════
// App State
// ═══════════════════════════════════════════
let currentUser = null;
let currentDate = new Date();
let cardsData = {}; // dateKey -> [cards]
let saveTimeout = null;

// ═══════════════════════════════════════════
// Auth (simple hash-based)
// ═══════════════════════════════════════════
async function simpleHash(str) {
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function registerUser(username, password) {
    username = username.trim().toLowerCase();
    if (!username || username.length < 2) return 'Username must be at least 2 characters';
    if (/[\s\/\\"']/.test(username)) return 'Username cannot contain spaces or special chars';
    if (!password || password.length < 4) return 'Password must be at least 4 characters';

    const existing = await Storage.get(`user:${username}`);
    if (existing) return 'Username already taken';

    const hash = await simpleHash(password);
    await Storage.set(`user:${username}`, { hash, created: Date.now() });
    return null;
}

async function loginUser(username, password) {
    username = username.trim().toLowerCase();
    if (!username || !password) return 'Please fill in both fields';

    const user = await Storage.get(`user:${username}`);
    if (!user) return 'User not found';

    const hash = await simpleHash(password);
    if (hash !== user.hash) return 'Incorrect password';

    return null;
}

// ═══════════════════════════════════════════
// Data persistence
// ═══════════════════════════════════════════
async function loadUserData() {
    const data = await Storage.get(`tasks:${currentUser}`);
    cardsData = data || {};
}

function scheduleSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => {
        await Storage.set(`tasks:${currentUser}`, cardsData);
    }, 300);
}

// ═══════════════════════════════════════════
// Date helpers
// ═══════════════════════════════════════════
function formatDate(date) {
    return date.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
}
function getDateKey(date) { return date.toISOString().split('T')[0]; }
function formatDateInput(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════
function updateDateDisplay() {
    document.getElementById('currentDate').textContent = formatDate(currentDate);
    document.getElementById('datePicker').value = formatDateInput(currentDate);
}

function renderCards() {
    const container = document.getElementById('cardsContainer');
    const dk = getDateKey(currentDate);
    const cards = cardsData[dk] || [];

    if (cards.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">&#9744;</div>
                <p>Nothing here yet.<br>Add a card to start planning.</p>
            </div>`;
        return;
    }

    container.innerHTML = '';
    cards.forEach((card, ci) => {
        const total = card.tasks.length;
        const done = card.tasks.filter(t => t.completed).length;

        const el = document.createElement('div');
        el.className = 'card';
        el.style.animationDelay = `${ci * 0.05}s`;
        el.innerHTML = `
            <div class="card-head">
                <input class="card-title-input" value="${esc(card.title)}" placeholder="Card title">
                <span class="card-count">${done}/${total}</span>
                <button class="icon-btn danger" title="Remove card">&times;</button>
            </div>
            <div class="tasks-list">
                ${card.tasks.map((task, ti) => `
                    <div class="task-row ${task.completed ? 'completed' : ''}">
                        <label class="custom-check">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} data-ci="${ci}" data-ti="${ti}">
                            <span class="check-visual">&#10003;</span>
                        </label>
                        <input class="task-text-input" value="${esc(task.text)}" placeholder="Task..." data-ci="${ci}" data-ti="${ti}">
                        <button class="icon-btn danger" data-ci="${ci}" data-ti="${ti}" title="Remove">&times;</button>
                    </div>
                `).join('')}
            </div>
            <div class="add-task-row" data-ci="${ci}">
                <span class="plus">+</span> Add task
            </div>
        `;

        // Card title
        el.querySelector('.card-title-input').addEventListener('input', e => {
            cardsData[dk][ci].title = e.target.value;
            scheduleSave();
        });

        // Remove card
        el.querySelector('.card-head .icon-btn').addEventListener('click', () => {
            cardsData[dk].splice(ci, 1);
            if (cardsData[dk].length === 0) delete cardsData[dk];
            scheduleSave();
            renderCards();
        });

        // Checkboxes
        el.querySelectorAll('.task-row input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', () => {
                const c = +cb.dataset.ci, t = +cb.dataset.ti;
                cardsData[dk][c].tasks[t].completed = cb.checked;
                scheduleSave();
                renderCards();
            });
        });

        // Task text
        el.querySelectorAll('.task-text-input').forEach(inp => {
            inp.addEventListener('input', () => {
                const c = +inp.dataset.ci, t = +inp.dataset.ti;
                cardsData[dk][c].tasks[t].text = inp.value;
                scheduleSave();
            });
        });

        // Remove task
        el.querySelectorAll('.task-row .icon-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const c = +btn.dataset.ci, t = +btn.dataset.ti;
                cardsData[dk][c].tasks.splice(t, 1);
                scheduleSave();
                renderCards();
            });
        });

        // Add task
        el.querySelector('.add-task-row').addEventListener('click', () => {
            cardsData[dk][ci].tasks.push({ text: '', completed: false });
            scheduleSave();
            renderCards();
            // Focus new input
            setTimeout(() => {
                const inputs = container.querySelectorAll(`.card:nth-child(${ci+1}) .task-text-input`);
                const last = inputs[inputs.length - 1];
                if (last) last.focus();
            }, 50);
        });

        container.appendChild(el);
    });
}

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
async function initApp() {
    const loading = document.getElementById('loadingOverlay');

    // Check saved session
    try {
        const session = await Storage.get('session');
        if (session && session.user) {
            currentUser = session.user;
            await loadUserData();
            enterApp();
        }
    } catch {}

    loading.classList.add('fade-out');
    setTimeout(() => loading.style.display = 'none', 300);

    // ── Login/Register UI ──
    document.getElementById('showRegister').addEventListener('click', () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('regError').textContent = '';
    });
    document.getElementById('showLogin').addEventListener('click', () => {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('loginError').textContent = '';
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        const err = await loginUser(u, p);
        if (err) {
            document.getElementById('loginError').textContent = err;
            return;
        }
        currentUser = u.trim().toLowerCase();
        await Storage.set('session', { user: currentUser });
        await loadUserData();
        enterApp();
        showToast('Welcome back!');
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
        const u = document.getElementById('regUser').value;
        const p = document.getElementById('regPass').value;
        const p2 = document.getElementById('regPass2').value;
        if (p !== p2) { document.getElementById('regError').textContent = 'Passwords don\'t match'; return; }
        const err = await registerUser(u, p);
        if (err) { document.getElementById('regError').textContent = err; return; }
        currentUser = u.trim().toLowerCase();
        await Storage.set('session', { user: currentUser });
        cardsData = {};
        enterApp();
        showToast('Account created!');
    });

    // Enter on password fields
    document.getElementById('loginPass').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('regPass2').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('registerBtn').click();
    });

    // ── App controls ──
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await Storage.delete('session');
        currentUser = null;
        cardsData = {};
        document.getElementById('app').classList.remove('active');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
    });

    document.getElementById('prevDay').addEventListener('click', () => {
        currentDate.setDate(currentDate.getDate() - 1);
        updateDateDisplay();
        renderCards();
    });
    document.getElementById('nextDay').addEventListener('click', () => {
        currentDate.setDate(currentDate.getDate() + 1);
        updateDateDisplay();
        renderCards();
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
        currentDate = new Date();
        updateDateDisplay();
        renderCards();
    });
    document.getElementById('calendarPicker').addEventListener('click', () => {
        const dp = document.getElementById('datePicker');
        dp.showPicker();
    });
    document.getElementById('datePicker').addEventListener('change', e => {
        if (e.target.value) {
            currentDate = new Date(e.target.value + 'T12:00:00');
            updateDateDisplay();
            renderCards();
        }
    });
    document.getElementById('addCardBtn').addEventListener('click', () => {
        const dk = getDateKey(currentDate);
        if (!cardsData[dk]) cardsData[dk] = [];
        cardsData[dk].push({ title: 'New Card', tasks: [] });
        scheduleSave();
        renderCards();
    });
}

function enterApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    document.getElementById('displayUser').textContent = currentUser;
    updateDateDisplay();
    renderCards();
}

initApp();
</script>
